name: Update price table images

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 05:00 JST every day
    - cron: "0 20 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  update-price-tables:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
      IMAGEKIT_URL_ENDPOINT: ${{ secrets.IMAGEKIT_URL_ENDPOINT }}
      PUBLIC_SITE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      MAX_FIXED_PAGE_SLOTS: "5"
      RENT_TABLE_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      RENT_TABLE_FONT_BOLD_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest -q

      - name: Update all price tables
        run: PYTHONPATH=. python scripts/update_all_price_tables.py --brands DM DF --max-slots "$MAX_FIXED_PAGE_SLOTS" --allow-partial

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-table-update-reports
          path: reports/

      - name: Notify data errors
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import os

          report_path = Path("reports/update_result.json")
          rows = json.loads(report_path.read_text(encoding="utf-8"))
          failures = [row for row in rows if row.get("status") != "success"]
          report_url = os.environ.get("PUBLIC_SITE_BASE_URL", "").rstrip("/") + "/reports/"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          lines = [
              "## 募集賃料表 自動更新レポート",
              "",
              f"- 更新対象: {len(rows)}件",
              f"- 要確認: {len(failures)}件",
              f"- 診断ページ: {report_url}",
              "",
          ]
          if failures:
              lines.append("### 要確認の物件")
              print("Price table update completed with data errors:")
              for row in failures:
                  message = f"{row.get('brand')} {row.get('property_id')} {row.get('property_name')}: {row.get('error')}"
                  print(f"- {message}")
                  print(f"::error title={row.get('property_id')} data error::{message}")
                  lines.append(f"- **{row.get('brand')} {row.get('property_id')} {row.get('property_name')}**: {row.get('error')}")
              if summary_path:
                  Path(summary_path).write_text("\n".join(lines), encoding="utf-8")
              raise SystemExit(1)
          lines.append("全物件の更新が正常に完了しました。")
          if summary_path:
              Path(summary_path).write_text("\n".join(lines), encoding="utf-8")
          print("All property price tables updated successfully.")
          PY
